<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>متتبع المشروع - Project Tracker</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
  </style>
</head>
<body class="bg-gradient-to-br from-slate-950 via-slate-900 to-slate-800 text-white">
  <div class="min-h-screen p-8">
    <div class="max-w-6xl mx-auto">
      <!-- Header -->
      <div class="flex items-center gap-3 mb-8">
        <div class="w-12 h-12 bg-gradient-to-br from-cyan-400 to-blue-500 rounded-lg"></div>
        <div>
          <h1 class="text-4xl font-bold">متتبع المشروع</h1>
          <p class="text-slate-400">خطة العمل للأسبوع الحالي</p>
        </div>
      </div>

      <!-- Stats -->
      <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
        <div class="bg-slate-800/50 border border-slate-700 rounded-xl p-6">
          <p class="text-slate-400 text-sm mb-2">إجمالي المهام</p>
          <p class="text-3xl font-bold">33</p>
        </div>
        <div class="bg-slate-800/50 border border-slate-700 rounded-xl p-6">
          <p class="text-slate-400 text-sm mb-2">المكتملة</p>
          <p class="text-3xl font-bold text-cyan-400" id="completed">0</p>
        </div>
        <div class="bg-slate-800/50 border border-slate-700 rounded-xl p-6">
          <p class="text-slate-400 text-sm mb-2">نسبة الإنجاز</p>
          <p class="text-3xl font-bold text-emerald-400" id="percentage">0%</p>
        </div>
      </div>

      <!-- Tasks Container -->
      <div id="tasks-container" class="space-y-4"></div>

      <!-- Footer -->
      <div class="mt-12 pt-8 border-t border-slate-700 text-center text-slate-400 text-sm">
        <p>آخر تحديث: <span id="date"></span></p>
      </div>
    </div>
  </div>

  <script>
    const tasks = [
      { id: 1, title: 'تصوير فيديو - "مو كل تبرع.. يعتبر تبرع"', category: 'إنتاج فيديو', dueDate: 'اليوم', priority: 'عالي', status: false },
      { id: 2, title: 'مونتاج - "مو كل تبرع.. يعتبر تبرع"', category: 'إنتاج فيديو', dueDate: 'اليوم', priority: 'عالي', status: false },
      { id: 3, title: 'تصوير - "تحدي الخير"', category: 'إنتاج فيديو', dueDate: 'اليوم', priority: 'متوسط', status: false },
      { id: 4, title: 'مونتاج - "تحدي الخير"', category: 'إنتاج فيديو', dueDate: 'اليوم', priority: 'متوسط', status: false },
      { id: 5, title: 'تصوير في الأبراج - "الحياد والاستقلالية"', category: 'إنتاج فيديو', dueDate: 'اليوم', priority: 'عالي', status: false },
      { id: 6, title: 'مونتاج - "الحياد والاستقلالية"', category: 'إنتاج فيديو', dueDate: 'اليوم', priority: 'عالي', status: false },
      { id: 7, title: 'تصوير - "التعليم البديل"', category: 'إنتاج فيديو', dueDate: 'اليوم', priority: 'عالي', status: false },
      { id: 8, title: 'مونتاج - "التعليم البديل"', category: 'إنتاج فيديو', dueDate: 'اليوم', priority: 'عالي', status: false },
      { id: 9, title: 'تصوير - "أول مرة تفكر تتطوع"', category: 'إنتاج فيديو', dueDate: 'اليوم', priority: 'متوسط', status: false },
      { id: 10, title: 'مونتاج - "أول مرة تفكر تتطوع"', category: 'إنتاج فيديو', dueDate: 'اليوم', priority: 'متوسط', status: false },
      { id: 11, title: 'استكمال مونتاج - "قصة الطفلة مسك ياسين"', category: 'إنتاج فيديو', dueDate: 'اليوم', priority: 'عالي', status: false },
      { id: 12, title: 'استكمال مونتاج - "موقف إنساني"', category: 'إنتاج فيديو', dueDate: 'اليوم', priority: 'عالي', status: false },
      { id: 13, title: 'استكمال مونتاج - "Good news"', category: 'إنتاج فيديو', dueDate: 'اليوم', priority: 'متوسط', status: false },
      { id: 14, title: 'استكمال مونتاج - "جمعية السرطان"', category: 'إنتاج فيديو', dueDate: 'اليوم', priority: 'متوسط', status: false },
      { id: 15, title: 'استكمال مونتاج - "الحزن على الحيوان"', category: 'إنتاج فيديو', dueDate: 'اليوم', priority: 'منخفض', status: false },
      { id: 16, title: 'استكمال مونتاج - "احتياجات النساء"', category: 'إنتاج فيديو', dueDate: 'اليوم', priority: 'منخفض', status: false },
      { id: 17, title: 'استكمال مونتاج - "علمني الميدان"', category: 'إنتاج فيديو', dueDate: 'اليوم', priority: 'منخفض', status: false },
      { id: 18, title: 'استكمال مونتاج - "سقيا الماء"', category: 'إنتاج فيديو', dueDate: 'اليوم', priority: 'منخفض', status: false },
      { id: 19, title: 'تجهيز 22 بريف', category: 'تجهيز البريفات', dueDate: 'اليوم', priority: 'عالي', status: false },
      { id: 20, title: 'تصوير المواهب - نوف', category: 'تصوير المواهب', dueDate: 'الجمعة', priority: 'عالي', status: false },
      { id: 21, title: 'تصوير المواهب - عبدالله', category: 'تصوير المواهب', dueDate: 'الجمعة', priority: 'عالي', status: false },
      { id: 22, title: 'تصوير المواهب - زهر', category: 'تصوير المواهب', dueDate: 'الجمعة', priority: 'عالي', status: false },
      { id: 23, title: 'تصوير المواهب - سالم', category: 'تصوير المواهب', dueDate: 'الجمعة', priority: 'عالي', status: false },
      { id: 24, title: 'تصوير المواهب - هنادي', category: 'تصوير المواهب', dueDate: 'الجمعة', priority: 'عالي', status: false },
      { id: 25, title: 'إرسال سكربت - يوسف', category: 'توزيع السكربتات', dueDate: 'الجمعة', priority: 'متوسط', status: false },
      { id: 26, title: 'إرسال سكربت - عبدالرحمن', category: 'توزيع السكربتات', dueDate: 'الجمعة', priority: 'متوسط', status: false },
      { id: 27, title: 'إرسال سكربت - الهنيامي', category: 'توزيع السكربتات', dueDate: 'الجمعة', priority: 'متوسط', status: false },
      { id: 28, title: 'إرسال سكربت - منى', category: 'توزيع السكربتات', dueDate: 'الجمعة', priority: 'متوسط', status: false },
      { id: 29, title: 'كتابة 33 سكربت', category: 'الكتابة', dueDate: 'الجمعة', priority: 'عالي', status: false },
      { id: 30, title: 'Social Media Strategy', category: 'استراتيجية', dueDate: 'الجمعة', priority: 'عالي', status: false },
      { id: 31, title: 'Social Media Tracker', category: 'استراتيجية', dueDate: 'الجمعة', priority: 'عالي', status: false },
      { id: 32, title: 'قائمة أفكار الحج', category: 'محتوى', dueDate: 'الجمعة', priority: 'عالي', status: false },
      { id: 33, title: 'Brand Guideline (IM)', category: 'إرشادات', dueDate: 'الجمعة', priority: 'عالي', status: false },
    ];

    const categories = ['إنتاج فيديو', 'تجهيز البريفات', 'تصوير المواهب', 'توزيع السكربتات', 'الكتابة', 'استراتيجية', 'محتوى', 'إرشادات'];

    function renderTasks() {
      const container = document.getElementById('tasks-container');
      const grouped = {};
      
      tasks.forEach(t => {
        if (!grouped[t.category]) grouped[t.category] = [];
        grouped[t.category].push(t);
      });

      categories.forEach(cat => {
        if (!grouped[cat]) return;
        const catTasks = grouped[cat];
        const completed = catTasks.filter(t => t.status).length;
        const percent = catTasks.length ? Math.round((completed / catTasks.length) * 100) : 0;

        const section = document.createElement('div');
        section.className = 'bg-slate-800/30 border border-slate-700 rounded-xl overflow-hidden';
        
        const header = document.createElement('div');
        header.className = 'px-6 py-4 bg-slate-800/50 cursor-pointer hover:bg-slate-700/30';
        header.innerHTML = `
          <div class="flex justify-between items-center">
            <h2 class="text-lg font-semibold text-white">${cat}</h2>
            <span class="text-sm text-slate-400">${completed}/${catTasks.length}</span>
          </div>
          <div class="w-full h-1.5 bg-slate-700 rounded-full mt-2 overflow-hidden">
            <div class="h-full bg-gradient-to-r from-cyan-400 to-blue-500" style="width: ${percent}%"></div>
          </div>
        `;
        
        let expanded = false;
        header.onclick = () => {
          expanded = !expanded;
          body.style.display = expanded ? 'block' : 'none';
        };

        const body = document.createElement('div');
        body.className = 'divide-y divide-slate-700 hidden';
        body.innerHTML = catTasks.map((task, i) => `
          <div class="px-6 py-4 hover:bg-slate-700/20 cursor-pointer transition-all flex items-start gap-3">
            <input type="checkbox" id="task-${task.id}" class="w-5 h-5 mt-1" ${task.status ? 'checked' : ''} 
              onchange="toggleTask(${task.id})">
            <div class="flex-1">
              <label for="task-${task.id}" class="font-medium cursor-pointer ${task.status ? 'line-through text-slate-500' : 'text-white'}">${task.title}</label>
              <div class="flex gap-2 mt-2 text-xs">
                <span class="px-2 py-1 rounded bg-slate-700/50 text-slate-300">${task.dueDate}</span>
                <span class="px-2 py-1 rounded ${task.priority === 'عالي' ? 'bg-red-500/10 text-red-300' : task.priority === 'متوسط' ? 'bg-amber-500/10 text-amber-300' : 'bg-blue-500/10 text-blue-300'}">${task.priority}</span>
              </div>
            </div>
          </div>
        `).join('');

        section.appendChild(header);
        section.appendChild(body);
        container.appendChild(section);
      });
    }

    function toggleTask(id) {
      const task = tasks.find(t => t.id === id);
      if (task) {
        task.status = !task.status;
        updateStats();
      }
    }

    function updateStats() {
      const completed = tasks.filter(t => t.status).length;
      const percentage = Math.round((completed / tasks.length) * 100);
      document.getElementById('completed').textContent = completed;
      document.getElementById('percentage').textContent = percentage + '%';
    }

    document.getElementById('date').textContent = new Date().toLocaleDateString('ar-AE');
    renderTasks();
  </script>
</body>
</html>
